wsjcpp_version: v0.0.1
cmake_cxx_standard: 11
cmake_minimum_required: 3.5

name: wsjcpp-logger
version: v1.0.1
description: C++ Logger Implementation
issues: https://github.com/wsjcpp/wsjcpp-logger/issues
repositories:
  - type: main
    url: "https://github.com/wsjcpp/wsjcpp-logger"
keywords:
  - c++
  - wsjcpp
  - logger

authors:
  - name: Evgenii Sopov
    email: mrseakg@gmail.com

distribution:
  - source-file: src/wsjcpp-logger/wsjcpp_logger.cpp
    target-file: wsjcpp_logger.cpp
    type: "source-code"
  - source-file: src/wsjcpp-logger/wsjcpp_logger.h
    target-file: wsjcpp_logger.h
    type: "source-code" # todo must be header-file

